<!--
  Pharaon — a Qt Quick WebAssembly application
  Served via GitHub Pages; WASM artifacts live in the build output directory.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>
    <meta name="description" content="Pharaon — the late 17th-century French card game, playable in your browser.">
    <title>Pharaon</title>
    <style>
      html, body { padding: 0; margin: 0; overflow: hidden; height: 100%; background: #1a0f07; }
      #screen { width: 100%; height: 100%; }
      #qtspinner {
        margin: 0; padding: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        height: 100%; color: #c9a84c;
        font-family: Georgia, serif;
      }
      #qtspinner img { opacity: 0.6; }
      #qtspinner strong { margin-top: 1em; font-size: 1.2em; letter-spacing: 0.1em; }
      #qtstatus { margin-top: 0.5em; font-size: 0.9em; opacity: 0.7; }
    </style>
  </head>
  <body onload="init()">
    <figure id="qtspinner">
      <img src="build/WebAssembly_Qt_6_8_3_single_threaded-Release/qtlogo.svg" width="160" height="100">
      <strong>Pharaon</strong>
      <div id="qtstatus">Loading…</div>
      <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
    </figure>
    <div id="screen"></div>

    <script type="text/javascript">
      async function init() {
        const spinner = document.querySelector('#qtspinner');
        const screen  = document.querySelector('#screen');
        const status  = document.querySelector('#qtstatus');

        const showUi = (ui) => {
          [spinner, screen].forEach(el => el.style.display = 'none');
          if (ui === screen) screen.style.position = 'default';
          ui.style.display = ui === spinner ? 'flex' : 'block';
        };

        const wasmBase = 'build/WebAssembly_Qt_6_8_3_single_threaded-Release/';
        try {
          showUi(spinner);
          const instance = await qtLoad({
            // Emscripten falls back to window.location when document.currentScript
            // is null at async execution time. locateFile overrides the .wasm lookup
            // to point to the correct subdirectory.
            locateFile: (path) => wasmBase + path,
            qt: {
              onLoaded: () => showUi(screen),
              onExit: exitData => {
                status.innerHTML = 'Application exited';
                if (exitData.code !== undefined) status.innerHTML += ` (code ${exitData.code})`;
                if (exitData.text !== undefined) status.innerHTML += `: ${exitData.text}`;
                showUi(spinner);
              },
              entryFunction: window.FaroGame_entry,
              containerElements: [screen],
            }
          });
        } catch (e) {
          console.error(e);
          status.innerHTML = 'Failed to load. See browser console for details.';
        }
      }
    </script>
    <script src="build/WebAssembly_Qt_6_8_3_single_threaded-Release/FaroGame.js"></script>
    <script src="build/WebAssembly_Qt_6_8_3_single_threaded-Release/qtloader.js"></script>
  </body>
</html>
